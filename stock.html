<style>
/* ===== KOSAI — Ticker Detail (shared DesignCode Glass system) ===== */
@font-face{font-family:"Pretendard";font-weight:400;font-style:normal;font-display:swap;src:url("fonts/Pretendard-Regular.woff2") format("woff2"), url("fonts/Pretendard-Regular.otf") format("opentype")}
@font-face{font-family:"Pretendard";font-weight:500;font-style:normal;font-display:swap;src:url("fonts/Pretendard-Medium.woff2") format("woff2"), url("fonts/Pretendard-Medium.otf") format("opentype")}
@font-face{font-family:"Pretendard";font-weight:600;font-style:normal;font-display:swap;src:url("fonts/Pretendard-SemiBold.woff2") format("woff2"), url("fonts/Pretendard-SemiBold.otf") format("opentype")}
@font-face{font-family:"Pretendard";font-weight:700;font-style:normal;font-display:swap;src:url("fonts/Pretendard-Bold.woff2") format("woff2"), url("fonts/Pretendard-Bold.otf") format("opentype")}
@font-face{font-family:"Pretendard";font-weight:800;font-style:normal;font-display:swap;src:url("fonts/Pretendard-ExtraBold.woff2") format("woff2"), url("fonts/Pretendard-ExtraBold.otf") format("opentype")}

:root{
  --brand-blue:rgb(13,105,212);--brand-cyan:rgb(95,197,255);
  --bg-1:rgb(242,243,250);--fg-1:rgb(0,0,0);--fg-2:rgba(0,0,0,0.7);--fg-3:rgba(0,0,0,0.5);
  --border-2:rgba(0,0,0,0.1);--hair:rgba(0,0,0,0.07);
  --up:#e5383b;--down:rgb(13,105,212);--flat:rgba(0,0,0,0.45);
  --up-soft:rgba(229,56,59,0.09);--down-soft:rgba(13,105,212,0.09);
  --shadow-1:0 1px 0 rgba(0,0,0,.05),0 4px 4px rgba(0,0,0,.05);
  --shadow-2:0 1px 0 rgba(0,0,0,.05),0 4px 4px rgba(0,0,0,.05),0 10px 20px rgba(0,0,0,.08);
  --shadow-3:0 1px 0 rgba(0,0,0,.05),0 18px 40px rgba(0,0,0,.18);
  --radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:20px;--pill:9999px;
  --font-sans:"Pretendard",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --pad:20px;
}
:root[data-theme="dark"]{
  --fg-1:rgb(255,255,255);--fg-2:rgba(255,255,255,0.72);--fg-3:rgba(255,255,255,0.5);
  --border-2:rgba(255,255,255,0.12);--hair:rgba(255,255,255,0.08);
  --up:#ff5b5e;--down:#5fa8ff;--flat:rgba(255,255,255,0.5);
  --up-soft:rgba(255,91,94,0.12);--down-soft:rgba(95,168,255,0.12);
  --shadow-2:0 1px 0 rgba(0,0,0,.2),0 10px 24px rgba(0,0,0,.4);
  --shadow-3:0 1px 0 rgba(0,0,0,.3),0 24px 48px rgba(0,0,0,.55);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth;scrollbar-gutter:stable}
body{margin:0;font-family:var(--font-sans);color:var(--fg-1);background:#eef1ff;
  -webkit-font-smoothing:antialiased;min-height:100vh;position:relative;font-variant-numeric:tabular-nums}
body::after{content:"";position:fixed;inset:0;z-index:-2;
  background:radial-gradient(ellipse 50% 38% at 10% -2%, rgba(120,157,255,.50), transparent 62%),
    radial-gradient(ellipse 52% 42% at 96% 6%, rgba(151,71,255,.40), transparent 64%),
    radial-gradient(ellipse 80% 55% at 50% 104%, rgba(95,197,255,.32), transparent 70%),
    linear-gradient(180deg,#eef1ff 0%, #e2e7fb 48%, #d5dbf6 100%);background-attachment:fixed}
:root[data-theme="dark"] body{background:#0e0e16}
:root[data-theme="dark"] body::after{
  background:radial-gradient(ellipse 50% 38% at 10% -2%, rgba(120,157,255,.32), transparent 62%),
    radial-gradient(ellipse 52% 42% at 96% 6%, rgba(151,71,255,.30), transparent 64%),
    radial-gradient(ellipse 80% 55% at 50% 104%, rgba(48,90,180,.30), transparent 70%),
    linear-gradient(180deg,#10121d 0%, #0d0e18 60%, #0a0b13 100%)}
body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
  background-image:linear-gradient(to right, rgba(255,255,255,.06) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,.06) 1px, transparent 1px);background-size:48px 48px}

.glass{background:rgba(255,255,255,0.62);border:1px solid rgba(255,255,255,0.55);
  box-shadow:var(--shadow-2),inset 0 1px 0 rgba(255,255,255,0.6);
  -webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-radius:var(--radius-xl)}
:root[data-theme="dark"] .glass{background:rgba(28,30,42,0.62);border-color:rgba(255,255,255,0.10);
  box-shadow:var(--shadow-2),inset 0 1px 0 rgba(255,255,255,0.08)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font:600 14px/1 var(--font-sans);
  border-radius:var(--radius-sm);cursor:pointer;border:0;transition:transform .12s,filter .15s,background .15s;white-space:nowrap}
.btn:active{transform:scale(.98)}
.btn-primary{background:#000;color:#fff;padding:11px 16px;box-shadow:var(--shadow-1)}
:root[data-theme="dark"] .btn-primary{background:#fff;color:#000}
.btn-soft{background:rgba(0,0,0,.05);color:var(--fg-1);padding:10px 14px;border:1px solid var(--border-2)}
.btn-soft:hover{background:rgba(0,0,0,.09)}
:root[data-theme="dark"] .btn-soft{background:rgba(255,255,255,.08)}

.wrap{max-width:1120px;margin:0 auto;padding-left:var(--pad);padding-right:var(--pad)}

/* nav */
.nav{position:sticky;top:12px;z-index:50;margin:12px auto 0;max-width:1120px;width:calc(100% - 2*var(--pad));
  display:flex;align-items:center;gap:16px;padding:10px 12px 10px 16px;border-radius:var(--radius-lg)}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--fg-1)}
.brand-name{font:700 19px/1 var(--font-sans);letter-spacing:-.02em;color:var(--fg-1)}
.nav-links{display:flex;gap:2px;margin-left:8px}
.nav-links a{font:500 14px var(--font-sans);color:var(--fg-2);text-decoration:none;padding:8px 13px;border-radius:var(--radius-sm);transition:.15s;white-space:nowrap}
.nav-links a:hover{color:var(--fg-1);background:rgba(0,0,0,.05)}
:root[data-theme="dark"] .nav-links a:hover{background:rgba(255,255,255,.08)}
.nav-links a.active{color:var(--fg-1);background:rgba(0,0,0,.07);font-weight:600}
:root[data-theme="dark"] .nav-links a.active{background:rgba(255,255,255,.10)}
.nav-spacer{flex:1}
.icon-btn{width:38px;height:38px;border-radius:var(--radius-sm);border:0;background:transparent;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--fg-2);transition:.15s}
.icon-btn:hover{background:rgba(0,0,0,.06);color:var(--fg-1)}
:root[data-theme="dark"] .icon-btn:hover{background:rgba(255,255,255,.08)}
.icon-btn svg{width:19px;height:19px}
.menu-btn{display:none}
.mobile-menu{display:none;position:fixed;top:70px;left:var(--pad);right:var(--pad);z-index:49;padding:8px;border-radius:var(--radius-lg);flex-direction:column;gap:2px}
.mobile-menu.open{display:flex}
.mobile-menu a{font:600 16px var(--font-sans);color:var(--fg-1);text-decoration:none;padding:13px 14px;border-radius:var(--radius-sm)}
.mobile-menu a:hover,.mobile-menu a.active{background:rgba(0,0,0,.06)}
:root[data-theme="dark"] .mobile-menu a:hover,:root[data-theme="dark"] .mobile-menu a.active{background:rgba(255,255,255,.08)}

/* breadcrumb */
.crumb{font:500 13px var(--font-sans);color:var(--fg-3);padding:26px 0 14px}
.crumb a{color:var(--fg-3);text-decoration:none}.crumb a:hover{color:var(--fg-1)}
.crumb b{color:var(--fg-2);font-weight:600}

/* ===== HEADER CARD ===== */
.tk-head{padding:0;overflow:hidden}
.th-sec{padding:24px 28px;border-top:1px solid var(--hair)}
.th-sec:first-child{border-top:0}
.th-id-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font:500 13px var(--font-sans);color:var(--fg-3);margin-bottom:12px}
.th-id-row .pill{font:600 12px var(--font-sans);color:var(--fg-2);background:rgba(0,0,0,.05);padding:4px 10px;border-radius:var(--pill);letter-spacing:.02em}
:root[data-theme="dark"] .th-id-row .pill{background:rgba(255,255,255,.08)}
.th-id-row .sep{opacity:.5}
.th-name-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.th-name{margin:0;font-size:clamp(30px,4.4vw,44px);font-weight:800;letter-spacing:-.035em;line-height:1}
.watch-btn{display:inline-flex;align-items:center;gap:6px;font:600 13px var(--font-sans);color:var(--fg-1);white-space:nowrap;
  background:rgba(0,0,0,.05);border:1px solid var(--border-2);padding:8px 14px;border-radius:var(--pill);cursor:pointer;transition:.15s}
.watch-btn:hover{background:rgba(0,0,0,.09)}
:root[data-theme="dark"] .watch-btn{background:rgba(255,255,255,.08)}
.watch-btn svg{width:15px;height:15px}
.watch-btn.on{background:var(--fg-1);color:var(--bg-1);border-color:var(--fg-1)}
.watch-btn.on svg{fill:currentColor}
.th-meta{margin-top:10px;font:400 13px/1.5 var(--font-sans);color:var(--fg-3)}

/* price */
.th-price{display:flex;align-items:baseline;gap:18px;flex-wrap:wrap}
.th-now{font:800 42px/1 var(--font-sans);letter-spacing:-.03em}
.th-chg{font:700 17px var(--font-sans)}
.th-chg.up{color:var(--up)}.th-chg.down{color:var(--down)}
.th-ts{margin-left:auto;font:500 12px var(--font-sans);color:var(--fg-3);align-self:flex-end}

/* metric grid */
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--hair);border:1px solid var(--hair);border-radius:var(--radius-md);overflow:hidden}
.m{background:rgba(255,255,255,0.4);padding:14px 16px}
:root[data-theme="dark"] .m{background:rgba(255,255,255,0.02)}
.m .k{font:500 12px var(--font-sans);color:var(--fg-3)}
.m .val{font:700 22px var(--font-sans);letter-spacing:-.02em;margin-top:5px;line-height:1.05;white-space:nowrap}
.m .peer{font:500 11.5px/1.35 var(--font-sans);color:var(--fg-3);margin-top:6px}
.m .peer b{color:var(--fg-2);font-weight:600}
.m .peer .d.up{color:var(--up);font-weight:700}.m .peer .d.down{color:var(--down);font-weight:700}

/* secondary */
.th-grid2{display:grid;grid-template-columns:1fr 1fr;gap:28px;align-items:start}
.kv{display:flex;flex-direction:column}
.kv .row{display:flex;gap:12px;align-items:baseline;padding:9px 0;border-top:1px solid var(--hair)}
.kv .row:first-child{border-top:0}
.kv .k{font:500 13px var(--font-sans);color:var(--fg-3);min-width:96px}
.kv .v{font:600 14px var(--font-sans)}
.kv .x{margin-left:auto;font:500 12px var(--font-sans);color:var(--fg-3)}
.holders{display:flex;flex-wrap:wrap;gap:4px 0;flex:1}
.holders .h{font:500 12.5px var(--font-sans);color:var(--fg-2)}
.holders .h+.h::before{content:"·";color:var(--fg-3);margin:0 7px}
.holders .h b{font-weight:700;margin-left:4px}
.ret-label{font:600 11px var(--font-sans);letter-spacing:.04em;color:var(--fg-3);margin-bottom:8px}
.ret-tbl{width:100%;border-collapse:collapse}
.ret-tbl th,.ret-tbl td{padding:8px 6px;font:600 13px var(--font-sans);text-align:right}
.ret-tbl thead th{font:600 11px var(--font-sans);color:var(--fg-3);border-bottom:1px solid var(--border-2)}
.ret-tbl thead th:first-child,.ret-tbl td:first-child{text-align:left}
.ret-tbl td:first-child{font:500 12px var(--font-sans);color:var(--fg-3)}
.ret-tbl td{border-top:1px solid var(--hair)}
.ret-tbl tbody tr:first-child td{border-top:0}
.ret-tbl .up{color:var(--up)}.ret-tbl .down{color:var(--down)}

/* ===== report body ===== */
.col{max-width:880px;margin:0 auto}
.sec{padding:46px 0 0}
.sec-kicker{font:700 12px var(--font-sans);letter-spacing:.1em;color:var(--fg-3);margin-bottom:7px}
.sec-num{color:var(--brand-blue)}:root[data-theme="dark"] .sec-num{color:var(--brand-cyan)}
.sec-title{margin:0 0 18px;font-size:clamp(22px,3vw,28px);font-weight:700;letter-spacing:-.03em}
.hairline{border:0;border-top:1px solid var(--hair);max-width:880px;margin:42px auto 0}

.prose p{margin:0 0 15px;font:400 16px/1.75 var(--font-sans);color:var(--fg-2);text-wrap:pretty}
.prose p b,.prose strong{font-weight:700;color:var(--fg-1)}
/* 한국어 본문 줄바꿈 통일: 단어 단위로 끊고(중간 끊김 방지), 정렬·줄바꿈 일관화 */
.prose p,.factor p,.tldr p,.kpoints li,.risk .body,.overview .lead,.desc,.sec-lead,.wrapup p{word-break:keep-all;overflow-wrap:break-word}
.subhead{font:700 15px var(--font-sans);color:var(--fg-2);margin:24px 0 10px}

/* report overview */
.overview .lead{font:700 clamp(20px,2.6vw,26px)/1.3 var(--font-sans);letter-spacing:-.02em;margin:0 0 12px;text-wrap:pretty}
.desc{font:400 17px/1.85 var(--font-sans);color:var(--fg-2);margin:0 0 24px}
.kpoints{counter-reset:kp;list-style:none;margin:0 0 22px;padding:0;display:flex;flex-direction:column;gap:12px}
.kpoints li{position:relative;padding-left:38px;font:400 16px/1.55 var(--font-sans);color:var(--fg-2)}
.kpoints li::before{counter-increment:kp;content:counter(kp);position:absolute;left:0;top:-1px;width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(0,0,0,.06);
  font:700 13px var(--font-sans);color:var(--fg-1)}
:root[data-theme="dark"] .kpoints li::before{background:rgba(255,255,255,.1)}
.rep-meta{display:flex;gap:8px 20px;flex-wrap:wrap;padding-top:16px;border-top:1px solid var(--hair);font:500 13px var(--font-sans);color:var(--fg-3)}
.rep-meta b{color:var(--fg-2);font-weight:600;margin-right:5px}
.rep-meta-end{margin-top:40px}

/* tldr */
.tldr{padding:20px 22px}
.tldr .tag{display:inline-block;font:700 11px var(--font-sans);letter-spacing:.06em;color:var(--fg-3);margin-bottom:10px}
.tldr p{margin:0;font:400 17px/1.7 var(--font-sans);color:var(--fg-2)}

/* glass table card */
.tbl-card{padding:0;overflow:hidden;margin-top:6px}
.tbl-cap{font:500 13px var(--font-sans);color:var(--fg-3);padding:14px 14px 10px}
.tbl-scroll{overflow-x:auto}
table.dt{width:100%;border-collapse:collapse}
table.dt th,table.dt td{padding:11px 14px;font:500 13.5px var(--font-sans);text-align:right;white-space:nowrap}
table.dt thead th{font:600 12.5px var(--font-sans);color:var(--fg-3);border-bottom:1px solid var(--border-2)}
table.dt th:first-child,table.dt td:first-child{text-align:left;font-weight:700;color:var(--fg-1)}
table.dt tbody td{border-top:1px solid var(--hair);color:var(--fg-1)}
table.dt tbody tr:first-child td{border-top:0}
table.dt td.note{text-align:left;font-weight:400;color:var(--fg-3);font-size:12.5px}
table.dt tr.sub td{font-size:12.5px;color:var(--fg-3);font-weight:500}
table.dt tr.sub td:first-child{padding-left:26px;font-weight:500;color:var(--fg-3)}
table.dt tr.total td{border-top:1.5px solid var(--border-2);font-weight:700}
table.dt .pos{color:var(--up);font-weight:700}table.dt .neg{color:var(--down);font-weight:700}
.tbl-foot{font:500 12px var(--font-sans);color:var(--fg-3);margin-top:10px}
/* 실적 차트 (inline SVG) */
.chart-card{padding:18px 18px 14px;margin-top:6px}
.chart-card+.chart-card{margin-top:14px}
.chart-cap{font:600 13.5px var(--font-sans);color:var(--fg-2);margin-bottom:2px}
.chart-legend{display:flex;gap:14px;flex-wrap:wrap;margin:8px 0 12px}
.chart-legend span{display:inline-flex;align-items:center;gap:6px;font:500 12px var(--font-sans);color:var(--fg-3)}
.chart-legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
.chart-legend i.line{width:14px;height:0;border-top:2px solid var(--fg-2);border-radius:0}
.kchart{width:100%;height:auto;display:block;overflow:visible}
.kchart .blabel{font:600 10.5px var(--font-sans)}
.kchart .axlabel{font:500 11px var(--font-sans)}
:root{--c-rev:rgba(13,105,212,.28);--c-op:rgb(13,105,212);--c-loss:#e5383b;--c-line:rgba(0,0,0,.55)}
:root[data-theme="dark"]{--c-rev:rgba(120,170,255,.34);--c-op:#6ea8ff;--c-loss:#ff6b6e;--c-line:rgba(255,255,255,.6)}

/* factors */
.factor{padding:18px 0;border-top:1px solid var(--hair)}
.factor:first-child{border-top:0}
.factor .fh{display:flex;align-items:baseline;gap:9px;font:700 17px var(--font-sans);letter-spacing:-.01em;margin:0 0 8px}
.factor .fh .mk{font-size:13px;flex:0 0 auto}
.factor.bull .fh .mk{color:var(--up)}.factor.bear .fh .mk{color:var(--down)}
.factor p{margin:0;font:400 15px/1.7 var(--font-sans);color:var(--fg-2)}

/* risk grid */
.risk{display:grid;grid-template-columns:140px 1fr;gap:1px;background:var(--hair);border:1px solid var(--hair);border-radius:var(--radius-md);overflow:hidden}
.risk .cat{background:rgba(0,0,0,.03);padding:18px 16px;font:700 14px var(--font-sans);color:var(--fg-1)}
:root[data-theme="dark"] .risk .cat{background:rgba(255,255,255,.03)}
.risk .body{background:rgba(255,255,255,0.35);padding:18px 18px;font:400 14.5px/1.65 var(--font-sans);color:var(--fg-2)}
:root[data-theme="dark"] .risk .body{background:rgba(255,255,255,0.02)}

/* finance tabs */
.fin-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.fin-tab{font:600 13px var(--font-sans);color:var(--fg-2);background:rgba(0,0,0,.05);border:0;padding:9px 15px;border-radius:var(--pill);cursor:pointer;transition:.15s}
.fin-tab:hover{color:var(--fg-1)}
.fin-tab.active{background:#000;color:#fff}
:root[data-theme="dark"] .fin-tab{background:rgba(255,255,255,.08)}
:root[data-theme="dark"] .fin-tab.active{background:#fff;color:#000}

/* timeline → plain text list */
.timeline{margin:0}
.tl{padding-top:18px;margin-top:18px;border-top:1px solid var(--hair)}
.tl:first-child{padding-top:0;margin-top:0;border-top:0}
.tl-date{display:flex;align-items:center;gap:9px;font:500 13px var(--font-sans);color:var(--fg-3);margin-bottom:5px;flex-wrap:wrap}
.tl-date .badge{font:600 11px var(--font-sans);color:var(--fg-2);background:rgba(0,0,0,.06);padding:2px 8px;border-radius:var(--pill)}
:root[data-theme="dark"] .tl-date .badge{background:rgba(255,255,255,.1)}

<script>
/* ============================================================
   KOSAI — lightweight in-place i18n (KO ⇄ EN)
   Text-node level translation: dictionary keyed by visible
   Korean text (whitespace-normalized). No reload, reversible.
   - Injects a KO/EN toggle to the left of #themeBtn
   - localStorage('kos-lang')
   - Pages: KOSi18n.register(dict, onChange)
   - Dynamic (JS-rendered) regions: mark container [data-i18n-skip]
     and re-render with KOSi18n.t() inside the onChange callback.
   - Placeholders: add attribute data-i18n-ph to the input.
   ============================================================ */
(function(){
  const KEY='kos-lang';
  const dict={};                 // normalized KO -> EN
  const listeners=[];
  const txtOrig=new WeakMap();   // textNode -> original nodeValue
  const phOrig=new WeakMap();    // element  -> original placeholder
  const blockOrig=new WeakMap(); // element  -> {html, key}
  let lang='ko';

  function getLang(){ try{ const v=localStorage.getItem(KEY); if(v) return v; return ((navigator.language||'ko').toLowerCase().startsWith('ko'))?'ko':'en'; }catch(e){ return 'ko'; } }
  function norm(s){ return (s==null?'':String(s)).replace(/\s+/g,' ').trim(); }

  function translateText(orig){
    const m=orig.match(/^(\s*)([\s\S]*?)(\s*)$/);
    const lead=m[1], core=norm(m[2]), trail=m[3];
    if(!core) return orig;
    const en=dict[core];
    return (en!=null)? (lead+en+trail) : orig;
  }

  function walk(node){
    if(node.nodeType===1){ // element
      const tag=node.tagName;
      if(tag==='SCRIPT'||tag==='STYLE'||tag==='NOSCRIPT') return;
      if(node.hasAttribute('data-i18n-skip')) return;
      if(node.hasAttribute('data-i18n-ph')){
        if(!phOrig.has(node)) phOrig.set(node, node.getAttribute('placeholder')||'');
        const ko=phOrig.get(node);
        node.setAttribute('placeholder', lang==='en' ? (dict[norm(ko)]||ko) : ko);
      }
      if(node.hasAttribute('data-i18n-block')){
        if(!blockOrig.has(node)) blockOrig.set(node, {html:node.innerHTML, key:norm(node.textContent||'')});
        const rec=blockOrig.get(node);
        if(lang==='en'){
          let en=dict[rec.key];
          if(en==null){
            // try with leading bull/bear marker stripped ("▲ X" / "▼ X" → "X")
            const stripped=rec.key.replace(/^[▲▼]\s*/,'');
            if(stripped!==rec.key && dict[stripped]!=null){
              const mk=rec.key.slice(0,1);
              en=mk+' '+dict[stripped];
            }
          }
          if(en!=null) node.textContent=en;
          else node.innerHTML=rec.html;
        } else {
          node.innerHTML=rec.html;
        }
        return;
      }
      for(let c=node.firstChild;c;c=c.nextSibling) walk(c);
    }else if(node.nodeType===3){ // text
      const v=node.nodeValue;
      if(!v || !v.trim()) return;
      if(!txtOrig.has(node)) txtOrig.set(node, v);
      const orig=txtOrig.get(node);
      node.nodeValue = (lang==='en') ? translateText(orig) : orig;
    }
  }

  function apply(){
    document.documentElement.setAttribute('lang', lang);
    if(document.body) walk(document.body);
    updateToggle();
  }

  function setLang(l){
    lang=l;
    try{ localStorage.setItem(KEY,l); }catch(e){}
    listeners.forEach(fn=>{ try{ fn(lang); }catch(e){} });  // let pages re-render dynamic parts first
    apply();
  }

  function t(ko){ if(ko==null) return ''; return lang==='en' ? (dict[norm(ko)]!=null?dict[norm(ko)]:ko) : ko; }

  function register(d, onChange){
    if(d){ for(const k in d){ dict[norm(k)]=d[k]; } }
    if(onChange){ listeners.push(onChange); try{ onChange(lang); }catch(e){} }
    apply();
  }

  /* ---- toggle UI ---- */
  function buildToggle(){
    const theme=document.getElementById('themeBtn');
    if(!theme || document.getElementById('langToggle')) return;
    const wrap=document.createElement('div');
    wrap.id='langToggle';
    wrap.setAttribute('role','group');
    wrap.setAttribute('aria-label','Language');
    wrap.innerHTML='<button type="button" data-l="ko">KO</button><button type="button" data-l="en">EN</button>';
    theme.parentNode.insertBefore(wrap, theme);
    wrap.addEventListener('click',e=>{ const b=e.target.closest('button'); if(b) setLang(b.dataset.l); });
    if(!document.getElementById('langToggleStyle')){
      const st=document.createElement('style'); st.id='langToggleStyle';
      st.textContent=`
        #langToggle{display:inline-flex;gap:2px;padding:3px;border-radius:9999px;
          background:rgba(0,0,0,.05);margin-right:2px}
        :root[data-theme="dark"] #langToggle{background:rgba(255,255,255,.08)}
        #langToggle button{border:0;background:transparent;cursor:pointer;
          font:700 12px/1 var(--font-sans,"Pretendard",sans-serif);letter-spacing:.02em;
          color:var(--fg-3);padding:7px 10px;border-radius:9999px;transition:background .15s,color .15s}
        #langToggle button:hover{color:var(--fg-1)}
        #langToggle button.on{background:#000;color:#fff}
        :root[data-theme="dark"] #langToggle button.on{background:#fff;color:#000}`;
      document.head.appendChild(st);
    }
  }
  function updateToggle(){
    const wrap=document.getElementById('langToggle'); if(!wrap) return;
    wrap.querySelectorAll('button').forEach(b=>b.classList.toggle('on', b.dataset.l===lang));
  }

  function autoMarkBlocks(){
    // Treat each visually-distinct prose unit as a single translation block,
    // so inline <b>/<strong>/<span> highlights don't split text into pieces
    // the dictionary can't match.
    const sel='.prose p,.factor p,.tldr p,.kpoints li,.risk .body,.wrapup p,.lead,.desc,.sec-lead';
    document.querySelectorAll(sel).forEach(el=>{
      if(!el.hasAttribute('data-i18n-block')) el.setAttribute('data-i18n-block','');
    });
  }

  function init(){ lang=getLang(); buildToggle(); autoMarkBlocks(); listeners.forEach(fn=>{ try{ fn(lang); }catch(e){} }); apply(); }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
  else init();

  window.KOSi18n={ register, t, setLang, get lang(){return lang;}, apply };
})();

</script>

  function cleanEn(s){

    }while(s!==prev && s);

    var letters=s.replace(/[^A-Za-z]/g,'');

  "메모리 사이클 회복과 HBM 양산이 동사 실적의 핵심 변수로 작용":"Memory cycle recovery and HBM volume production are the key drivers of earnings",
  "DRAM 가격 반등과 HBM3E 12단 양산 시점이 2026년 이익 가시성을 좌우하고 있다.":"The DRAM price rebound and the timing of HBM3E 12-layer volume production determine 2026 earnings visibility.",
  "2025년 3분기 영업이익 12.2조원으로 컨센서스(11.4조원)를 +7.0% 상회하며 메모리 회복 국면이 본격화되었다.":"3Q 2025 operating profit reached ₩12.2T, beating consensus (₩11.4T) by +7.0% and confirming the memory recovery is underway.",
  "HBM3E 12단의 엔비디아향 퀄(qualification) 진행 속도가 2026년 점유율 회복의 핵심 변수로 부상하였다.":"The pace of HBM3E 12-layer qualification with NVIDIA has become the key variable for 2026 share recovery.",

  // ----- ② summary -----
  "동사는 메모리 반도체(DRAM·NAND), 시스템 반도체(파운드리·LSI), 모바일(MX), 가전(VD·DA), 전장(하만) 등 복합 사업구조를 보유하고 있다. 2025년 들어 메모리 가격 회복과 HBM 출하 확대로 실적은 회복 국면에 진입하였으며, 3분기 영업이익은 전년동기 대비 +274% y-y 증가한 12.2조원을 기록하였다. 다만 HBM 부문에서의 후발 주자 부담, 파운드리 부문의 적자 지속, 미·중 수출 규제 등은 여전한 변수로 남아 있다. 향후 실적은 메모리 사이클의 지속성, HBM3E 12단의 양산 안착 시점, 파운드리 가동률 회복 속도가 결정할 것으로 추정된다.":"The company runs a diversified portfolio across memory (DRAM, NAND), system semiconductors (foundry, LSI), mobile (MX), consumer electronics (VD, DA), and automotive (Harman). Earnings entered a recovery phase in 2025 as memory prices rebounded and HBM shipments expanded — 3Q operating profit hit ₩12.2T, up +274% y/y. Lingering variables include the company's late-mover position in HBM, continued losses in foundry, and U.S.–China export controls. Future results will hinge on the persistence of the memory cycle, when HBM3E 12-layer ramps cleanly, and how quickly foundry utilization recovers.",

  // ----- ③ business -----
  "동사는 크게 5개 사업부문으로 구성된다. DS(Device Solutions, 반도체) 부문은 메모리(DRAM·NAND)와 시스템LSI·파운드리로 구분되며, 2024년 매출 기준 전사 매출의 약 38%를 차지한다. 메모리는 DRAM 시장점유율 약 42%, NAND 약 33%로 글로벌 1위 지위를 유지하고 있다.":"The company operates five business divisions. DS (Device Solutions, semiconductors) splits into memory (DRAM, NAND) and System LSI / foundry, and accounted for ~38% of company-wide 2024 revenue. The memory business holds the global #1 position with DRAM share around 42% and NAND around 33%.",
  "MX(Mobile eXperience) 부문은 갤럭시 스마트폰·태블릿·웨어러블을 담당하며, 매출 비중은 약 30% 수준이다. 2024년 기준 글로벌 스마트폰 출하량은 약 2.2억 대로 시장점유율 1위를 기록하였다. 다만 프리미엄 시장에서의 애플 대비 격차, 중저가 시장에서의 중국 업체와의 경쟁 심화는 지속되는 변수이다.":"MX (Mobile eXperience) covers Galaxy smartphones, tablets, and wearables — about 30% of revenue. Global smartphone shipments were roughly 220M units in 2024, keeping the company at #1 share. Persistent variables include the gap with Apple in premium and intensifying competition with Chinese makers in the mid- to low-end.",
  "VD(Visual Display)·DA(Digital Appliances) 부문은 TV·생활가전을 담당한다. 글로벌 TV 시장에서 19년 연속 1위를 유지하고 있으며, OLED·QLED 등 프리미엄 제품 비중 확대를 추진 중이다. 다만 글로벌 가전 수요 둔화와 패널 가격 변동성은 동 부문 마진의 핵심 변수로 작용한다.":"VD (Visual Display) and DA (Digital Appliances) cover TVs and home appliances. The company has been the global #1 TV brand for 19 consecutive years and is shifting its mix toward premium OLED and QLED. Sluggish global appliance demand and panel price volatility remain the key margin drivers for this segment.",
  "하만(Harman) 부문은 차량용 인포테인먼트와 프리미엄 오디오를 담당한다. 2024년 기준 매출 약 14조원, 영업이익률 약 9% 수준으로, 전장 시장 성장의 직접적 수혜를 받고 있다. Network 부문은 5G 통신장비를 담당하며 매출 비중은 상대적으로 낮으나 6G 시대를 대비한 R&D 투자가 진행 중이다.":"Harman covers automotive infotainment and premium audio. 2024 revenue was around ₩14T at ~9% operating margin, with the unit benefiting directly from auto-electronics growth. The Network unit covers 5G equipment — a small share of revenue but with active R&D for the 6G era.",
  "종합하면 동사는 메모리 사이클에 가장 큰 민감도를 가진 종목이나, MX·VD·하만 등 비메모리 사업의 안정적 현금 창출이 사이클 변동성을 일부 완충하는 구조이다. 그러나 영업이익의 절대 규모는 DS 부문이 좌우하며, 2025년 전사 영업이익의 약 70%가 메모리에서 발생한 것으로 추정된다.":"On the whole, the stock is the most sensitive name to the memory cycle, while steady cash generation from non-memory units (MX, VD, Harman) cushions some of that volatility. The absolute level of operating profit, however, is driven by DS — memory is estimated to have produced about 70% of 2025 company-wide operating profit.",

  // ----- ④ recent results -----
  "동사의 2025년 3분기 매출은 79.1조원으로 전년동기 대비 +8.4% y-y, 영업이익은 12.2조원으로 +274% y-y 증가하며 시장 컨센서스(매출 78.3조원, 영업이익 11.4조원)를 상회하였다. 영업이익률은 15.4%로 전년동기 4.5% 대비 큰 폭의 개선이 진행되었다.":"3Q 2025 revenue was ₩79.1T, up +8.4% y/y, with operating profit at ₩12.2T (+274% y/y), beating consensus (revenue ₩78.3T, OP ₩11.4T). The operating margin improved sharply to 15.4% from 4.5% in the prior-year quarter.",
  "DS 부문 영업이익은 8.7조원으로 전년동기 3.9조원 대비 +123% y-y 증가하였다. 메모리 가격 상승과 HBM 출하 확대가 주효했으며, DRAM ASP 상승률은 +14% q-q, NAND는 +9% q-q를 기록하였다. 다만 파운드리 부문은 약 1.1조원 적자가 지속된 것으로 추정되며, 가동률은 60% 수준으로 정상화에 시간이 필요한 상황이다.":"DS operating profit reached ₩8.7T, up +123% y/y from ₩3.9T. Memory ASP gains and HBM volume drove the result, with DRAM ASP +14% q/q and NAND +9% q/q. The foundry sub-segment, however, is estimated to have lost roughly ₩1.1T again, with utilization stuck around 60% — normalization will take time.",
  "MX 부문 영업이익은 2.4조원으로 전년동기 대비 +12% y-y 증가하였다. 갤럭시 S25 시리즈의 견조한 판매와 평균판매가격(ASP) 개선이 주효했으나, 비메모리 부품 원가 상승은 부담 요인으로 작용하였다.":"MX operating profit was ₩2.4T, up +12% y/y. Solid Galaxy S25 sales and ASP improvement supported the result, while higher non-memory component costs were a drag.",
  "종합하면 3분기 실적은 메모리 회복이 견인한 결과로, 비메모리 사업부의 둔화가 일부 상쇄 요인으로 작용하였다. 컨센서스 상회의 핵심 동인은 메모리 ASP 상승률이 시장 예상치를 +3~5%p 상회한 데 있다.":"On the whole, 3Q earnings were memory-driven, with softer non-memory units offsetting some of that strength. The main reason for the consensus beat: memory ASP gains came in +3–5 percentage points above expectations.",

  // ----- ⑤ outlook -----
  "2025년 4분기 매출은 78.5조원, 영업이익은 13.1조원 수준으로 시장 컨센서스가 형성되어 있다. 메모리 비트그로스(bit growth)는 DRAM +5% q-q, NAND +7% q-q로 추정되며, ASP 상승률은 DRAM +8~10% q-q로 전망된다. HBM 출하 비중 확대로 메모리 부문 영업이익률은 30% 중반대까지 회복될 가능성이 거론되고 있다.":"Market consensus for 4Q 2025 is revenue around ₩78.5T and operating profit around ₩13.1T. DRAM bit growth is estimated at +5% q/q and NAND at +7% q/q, with DRAM ASP expected to rise +8–10% q/q. As HBM's share of shipments grows, memory operating margin could recover to the mid-30% range.",
  "2026년 연간 매출 컨센서스는 332조원, 영업이익은 64조원 수준으로 추정된다. 이는 메모리 사이클의 연착륙과 HBM3E 12단 양산의 본격화를 가정한 수치이다. 다만 컨센서스 분포는 영업이익 기준 55조~78조원의 넓은 편차를 보이고 있어, 시장의 의견이 분기되고 있는 것으로 해석된다.":"Consensus for 2026 puts revenue near ₩332T and operating profit near ₩64T, assuming a soft memory landing and a clean HBM3E 12-layer ramp. The spread in OP estimates is wide — ₩55T to ₩78T — suggesting opinion is divided.",
  "파운드리 부문은 2026년에도 적자가 지속될 가능성이 시장 컨센서스로 자리잡고 있으나, 적자폭은 2024년 4조원 대비 점진적으로 축소될 것으로 추정된다. 3나노 GAA 공정의 신규 고객 확보가 손익 개선의 핵심 변수로 거론된다.":"Consensus expects foundry losses to continue in 2026, though the loss should narrow gradually from the ~₩4T level in 2024. Winning new customers on 3nm GAA is the key variable for any meaningful P&L improvement.",
  "사업부별 매출·영업이익 추정":"Segment revenue & OP estimates",

  "메모리":"Memory","시스템LSI·파운드리":"System LSI · Foundry","MX (모바일)":"MX (Mobile)","VD·DA":"VD · DA","하만":"Harman","Network · 기타":"Network · Other",

  // ----- ⑥ bull factors -----
  "HBM 수요 강세와 점유율 확보 여력":"Strong HBM demand and room to win share",
  "엔비디아·AMD의 AI 가속기 출하 확대에 따른 HBM3E 수요는 2026년에도 공급 부족 국면이 지속될 전망이다. 동사의 HBM3E 12단 양산이 2025년 4분기 본격화될 경우 점유율 격차 축소 여지가 존재한다. TrendForce는 동사 HBM 점유율이 2025년 32%에서 2026년 38% 수준까지 회복될 가능성을 제시하고 있다.":"HBM3E demand is expected to remain supply-constrained through 2026 as NVIDIA and AMD scale AI accelerator shipments. If the company's HBM3E 12-layer ramps in earnest from 4Q 2025, there is room to narrow the share gap. TrendForce sees its HBM share possibly recovering from ~32% in 2025 to ~38% in 2026.",
  "메모리 가격 회복 사이클의 지속성":"Memory price recovery cycle still has legs",
  "DRAM 현물가격은 2024년 4분기 이후 7개 분기 연속 상승세를 이어가고 있다. 글로벌 빅3 모두 CAPEX 절제 기조를 유지하고 있어, 2026년 상반기까지 수급 타이트 국면이 지속될 가능성이 거론된다. 이는 메모리 부문 영업이익률의 추가 개선 여지로 작용할 수 있다.":"DRAM spot prices have risen for seven straight quarters since 4Q 2024. With all three global majors maintaining disciplined CAPEX, the tight supply-demand picture is likely to persist into 1H 2026. That leaves further room for memory operating margin to improve.",
  "파운드리 첨단 공정의 신규 고객 확보 가능성":"Potential to win new advanced-node foundry customers",
  "3나노 GAA 공정의 수율이 60% 중반대까지 개선된 것으로 추정되며, 최근 신규 협력 논의가 시장에 거론되고 있다. 다만 실제 계약 체결과 양산 시점에 대한 가시성은 제한적이므로, 손익 기여는 빠르면 2026년 하반기부터 가시화될 가능성이 있다.":"3nm GAA yields are estimated to have improved to the mid-60% range, and new customer talks have been mentioned in the market. Visibility on actual contracts and production timing is limited, however — P&L contribution may not become visible until 2H 2026 at the earliest.",
  "자사주 매입·소각 정책의 안정성":"Steady share buyback and cancellation policy",
  "동사는 2024년 발표한 10조원 규모 자사주 매입 프로그램을 진행 중이며, 매입분의 약 70%를 소각 처리하는 정책을 유지하고 있다. FCF 기준 주주환원율은 2024년 약 55% 수준으로 글로벌 메모리 피어 대비 안정적으로 평가된다.":"The company is executing a ₩10T buyback program announced in 2024, with about 70% of repurchased shares being cancelled. FCF-based shareholder return was ~55% in 2024 — a steady level compared with global memory peers.",
  "원/달러 환율의 우호적 환경":"Supportive USD/KRW environment",
  "원/달러 환율은 1,380~1,420원 범위에서 횡보 중이며, 매출의 약 90%가 외화 표시인 점을 고려하면 영업 레버리지 효과가 지속되고 있다. 환율이 현 수준을 유지할 경우 2026년 영업이익에 약 3~5조원의 우호적 영향이 추정된다.":"USD/KRW is hovering in the 1,380–1,420 range. With ~90% of revenue in foreign currency, operating leverage continues to flow through. If FX holds at current levels, the tailwind to 2026 OP is estimated at around ₩3–5T.",

  // ----- ⑦ bear factors -----
  "HBM 시장에서의 후발 주자 부담":"Burden of being the HBM late mover",
  "동사의 HBM3E 양산은 SK하이닉스 대비 약 6~9개월의 시차가 존재한다. 엔비디아향 HBM3E 12단 퀄이 지연될 경우 2026년 점유율 회복 시나리오의 실현이 어려워질 가능성이 있다. HBM4 세대에서도 경쟁사의 선제적 양산 발표가 부담 요인으로 작용하고 있다.":"The company's HBM3E ramp lags SK Hynix by 6–9 months. If qualification of HBM3E 12-layer with NVIDIA slips, the 2026 share-recovery scenario becomes harder to deliver. Competitors' pre-emptive announcements of HBM4 mass production add to the burden.",
  "메모리 사이클의 단기 피크 우려":"Concerns about a near-term memory cycle peak",

  function splitSentences(p){

  function kBarChart(labels, bars, line, lineUnit){
    var W=620, H=232, padL=14, padR=14, padT=16, padB=34;
    var plotW=W-padL-padR, plotH=H-padT-padB, base=padT+plotH;
    var vals=[]; bars.forEach(function(b){ b.vals.forEach(function(v){ if(v!=null)vals.push(jo(v)); }); });
    if(!vals.length) return '';
    var vmax=Math.max.apply(null,vals.concat([0])), vmin=Math.min.apply(null,vals.concat([0]));

    var span=vmax-vmin, zeroY=padT+plotH*(vmax/span);
    function y(j){ return padT+plotH*((vmax-j)/span); }
    var n=labels.length, slot=plotW/n, nb=bars.length, gap=slot*0.16, bw=(slot-gap*2)/nb;

      }
      svg+='<polyline points="'+pts.join(' ')+'" fill="none" stroke="var(--c-line)" stroke-width="1.6" stroke-linejoin="round"/>'+dots;
    }

  }

      var aLabels=ann.map(function(a){return ''+a.year;});
      var aBars=[{color:'var(--c-rev)',vals:ann.map(function(a){return a.rev;})},
                 {color:'var(--c-op)',vals:ann.map(function(a){return a.op;})}];
      var aLine={vals:ann.map(function(a){return a.opm;})};
      h+=chartCard(f.chartAnnual, legend, kBarChart(aLabels,aBars,aLine,'%'));
    }
    var qtc=(Q.quarterly||[]);
    if(qtc.length>=2){
      var qLabels=qtc.map(function(r){return r.q.replace(/^20/,'').replace('Q','Q');});
      var qBars=[{color:'var(--c-rev)',vals:qtc.map(function(r){return r.rev;})},
                 {color:'var(--c-op)',vals:qtc.map(function(r){return r.op;})}];
      var legendQ='<span><i style="background:var(--c-rev)"></i>'+esc(revLbl)+'</span>'
        +'<span><i style="background:var(--c-op)"></i>'+esc(f.op)+'</span>'
        +'<span style="margin-left:auto;color:var(--fg-3)">'+esc(f.unitJo)+'</span>';
      h+=chartCard(f.chartQuarter, legendQ, kBarChart(qLabels,qBars,null,''));
    }
    if(ann.length){
      h+='<div class="tbl-card glass"><div class="tbl-cap">'+esc(f.annual)+'</div><div class="tbl-scroll"><table class="dt"><thead><tr>'
        +'<th>'+esc(f.year)+'</th><th>'+esc(revLbl)+'</th><th>'+esc(f.op)+'</th><th>'+esc(f.np)+'</th><th>'+esc(f.opm)+'</th><th>'+esc(f.roe)+'</th><th>'+esc(f.debt)+'</th></tr></thead><tbody>';
      ann.forEach(function(a){
        h+='<tr><td>'+a.year+'</td><td>'+fwon(a.rev)+'</td><td'+negc(a.op)+'>'+fwon(a.op)+'</td><td'+negc(a.np_owner)+'>'+fwon(a.np_owner)+'</td>'
          +'<td>'+fpct(a.opm)+'</td><td'+negc(a.roe)+'>'+fpct(a.roe)+'</td><td>'+fpct(a.debt_ratio)+'</td></tr>';
      });
      h+='</tbody></table></div></div>';
    }
    var qt=Q.quarterly||[];
    if(qt.length){
      h+='<div class="tbl-card glass" style="margin-top:14px"><div class="tbl-cap">'+esc(f.quarterly)+'</div><div class="tbl-scroll"><table class="dt"><thead><tr>'
        +'<th>'+esc(f.q)+'</th><th>'+esc(revLbl)+'</th><th>'+esc(f.op)+'</th><th>'+esc(f.np)+'</th></tr></thead><tbody>';
      qt.forEach(function(r){
        h+='<tr><td>'+esc(r.q)+'</td><td>'+fwon(r.rev)+'</td><td'+negc(r.op)+'>'+fwon(r.op)+'</td><td'+negc(r.np_owner)+'>'+fwon(r.np_owner)+'</td></tr>';
      });
      h+='</tbody></table></div></div>';
    }
    h+='<div class="tbl-foot">'+esc(f.foot.replace('{win}',V.ttm_window||'-').split(' · ')[0])+'</div>';
    h+='</section><hr class="hairline" />';
    h+=secOpen(pad(n++),'EARNINGS',u.sec.earnings)+prose(REP.earnings)+'</section><hr class="hairline" />';
    h+=secOpen(pad(n++),'INDUSTRY',u.sec.industry)+prose(REP.industry)+'</section><hr class="hairline" />';
    h+=secOpen(pad(n++),'OUTLOOK',u.sec.outlook)+prose(REP.outlook)+'</section><hr class="hairline" />';
    /* 밸류에이션 — TTM 자체 산출 + KRX 공식 값 */
    h+=secOpen(pad(n++),'VALUATION',u.sec.valuation);
    var vPer=(V.per!=null?V.per:V.per_ttm), vEps=(V.eps!=null?V.eps:V.eps_ttm),
        vPbr=(V.pbr!=null?V.pbr:V.pbr_q), vBps=(V.bps!=null?V.bps:V.bps_q),
        vDiv=(V.div!=null?V.div:V.div_krx), vDps=(V.dps!=null?V.dps:V.dps_krx);
    var lossNa=(vEps!=null&&vEps<0);
    var xb=(L()==='en'?'x':'배');
    // 주당 원화 금액: 영어=₩ 접두, 한국어=원 접미
    var cur=function(v){ if(v==null)return f.nodata; var n=(+v).toLocaleString('en-US'); return L()==='en'?'₩'+n:n+'원'; };
    var cells=[
      [f.per,  vPer!=null?fx(vPer,xb):(lossNa?f.na:f.nodata)],
      [f.pbr,  vPbr!=null?fx(vPbr,xb):f.nodata],
      [f.divy, vDiv!=null?fpct2(vDiv):f.nodata],
      [f.eps,  cur(vEps)],
      [f.bps,  cur(vBps)],
      [f.dps,  cur(vDps)]
    ];
    h+='<div class="valgrid">'+cells.map(function(c){return '<div class="vm"><div class="vk">'+esc(c[0])+'</div><div class="vv">'+esc(c[1])+'</div></div>';}).join('')+'</div>';
    h+='<div class="tbl-foot" style="margin-bottom:22px">'+esc(f.foot.replace('{win}',V.ttm_window||'-'))+'</div>';
    if(REP.valuation_comment)h+=prose(REP.valuation_comment);
    h+='</section><hr class="hairline" />';
    h+=secOpen(pad(n++),'BULL CASE',u.sec.bull)+factors(REP.bull,'bull','▲')+'</section><hr class="hairline" />';
    h+=secOpen(pad(n++),'BEAR CASE',u.sec.bear)+factors(REP.bear,'bear','▼')+'</section><hr class="hairline" />';
    h+=secOpen(pad(n++),'RISK',u.sec.risk)+risksH(REP.risks)+'</section><hr class="hairline" />';
    /* 다음 체크포인트 */
    if(REP.checkpoints&&REP.checkpoints.length){
      h+=secOpen(pad(n++),'WHAT TO WATCH',u.sec.chk);
      h+='<div class="timeline">'+REP.checkpoints.map(function(c){
        return '<div class="tl"><div class="tl-date"><span class="badge">'+esc(pk(c.when))+'</span></div><p>'+esc(pk(c.what))+'</p></div>';
      }).join('')+'</div></section><hr class="hairline" />';
    }
    h+=secOpen(pad(n++),'VERDICT',u.sec.verdict);
    h+='<div class="wrapup glass"><p>'+esc(REP.verdict?pk(REP.verdict.body):'')+'</p></div></section>';
    var baseCards=[
      srcCardL(u.srcKRX, u.srcKRXsub, 'https://data.krx.co.kr', '📊'),
      srcCardL(u.srcDART, u.srcDARTsub, 'https://dart.fss.or.kr', '📄')
    ];
    var webCards=(REP.sources||[]).map(srcCard);
    h+='<hr class="hairline" />'+secOpen(pad(n++),'SOURCES',u.sec.sources);
    h+='<div class="srcgrid">'+baseCards.concat(webCards).join('')+'</div></section>';
    h+='<div class="col"><div class="rep-meta rep-meta-end"><span><b>'+esc(u.reportDate)+'</b>'+esc(REP.reportDate||'')+'</span></div></div>';
    return h;
  }
  function render(){
    var u=U(), Ln=L();
    var up=(STOCK.change>=0), cc=up?'up':'down', sign=up?'+':'';
    var chg=(STOCK.change==null?0:STOCK.change);

    document.getElementById('crumb').innerHTML='<a href="Home.html">'+esc(u.home)+'</a> / <a href="Reports.html">'+esc(u.reports)+'</a> / <b>'+esc(tname(STOCK.name))+' ('+TK+')</b>';
    document.getElementById('thId').innerHTML='<span>'+TK+'</span><span class="sep">·</span><span>'+esc(tname(STOCK.market))+'</span><span class="sep">·</span><span>'+esc(tname(STOCK.sector))+'</span>';
    document.getElementById('thName').textContent=tname(STOCK.name);
    document.getElementById('thMeta').textContent = REP ? (u.reportDate+' '+(REP.reportDate||'')) : '';
    document.getElementById('thNow').textContent=won(STOCK.price);
    var tc=document.getElementById('thChg'); tc.className='th-chg '+cc; tc.textContent=(up?'▲ ':'▼ ')+sign+chg.toFixed(2)+'%';

    // 밸류에이션 데이터: valuation.js 우선, 없으면 v2 리포트 quant 폴백
    var VAL=(window.KOS_VALUATION&&KOS_VALUATION.stocks&&KOS_VALUATION.stocks[TK])||null;
    if(!VAL && REP && REP.quant){ var rv=REP.quant.valuation||{}, ra=(REP.quant.annual||[])[0]||{};
      VAL={eps:rv.eps,bps:rv.bps,dps:rv.dps,roe:(rv.roe_ttm!=null?rv.roe_ttm:ra.roe)}; }
    VAL=VAL||{};
    var px=STOCK.price||0;
    // PER·PBR·배당은 '오늘 주가'로 즉석 계산(라이브), ROE는 분기값
    var perV=(VAL.eps&&VAL.eps>0&&px)? (px/VAL.eps):null;
    var pbrV=(VAL.bps&&VAL.bps>0&&px)? (px/VAL.bps):null;
    var divV=(VAL.dps!=null&&px)? (VAL.dps/px*100):null;
    var roeV=(VAL.roe!=null)? VAL.roe:null;
    var mult=function(v){ return v==null?'—':v.toFixed(1)+(L()==='en'?'x':'배'); };
    var pctv=function(v){ return v==null?'—':v.toFixed(2)+'%'; };
    var roep=function(v){ return v==null?'—':v.toFixed(1)+'%'; };
    var mk=u.mk, metrics=[
      [mk.mcap, mcap(STOCK.mcap), ''],
      [mk.amt, amt(STOCK.trading_value), ''],
      [mk.vol, vol(STOCK.volume), ''],
      [mk.shares, shN(STOCK.shares), ''],
      [mk.per, mult(perV), ''],
      [mk.pbr, mult(pbrV), ''],
      [mk.roe, roep(roeV), ''],
      [mk.divy, pctv(divV), '']
    ];
    document.getElementById('mgrid').innerHTML=metrics.map(function(m){return '<div class="m"><div class="k">'+esc(m[0])+'</div><div class="val">'+m[1]+'</div>'+(m[2]?'<div class="peer">'+esc(m[2])+'</div>':'')+'</div>';}).join('');
    fitMetricVals();

    var rb=document.getElementById('reportBody');
    if(REP&&REP.v===2){
      rb.innerHTML=renderV2(u);
    } else if(!REP){
      rb.innerHTML='<section class="sec col"><div class="tldr glass"><p>'+esc(u.none)+'</p></div></section>';
    } else {
      var h='', n=1;
      var ttl=REP.title?pk(REP.title):pk(REP.lead);
      h+='<div class="rep-masthead"><h1 class="rep-headline">'+esc(ttl)+'</h1></div>';
      h+=secOpen(pad(n++),'REPORT OVERVIEW',u.sec.overview);
      if(pk(REP.desc))h+='<p class="desc">'+esc(pk(REP.desc))+'</p>';
      if(REP.keypoints&&REP.keypoints.length)h+='<ol class="kpoints">'+REP.keypoints.map(function(k){return '<li>'+esc(pk(k))+'</li>';}).join('')+'</ol>';
      h+='</section><hr class="hairline" />';
      h+=secOpen(pad(n++),'BUSINESS',u.sec.business)+prose(REP.business)+'</section><hr class="hairline" />';
      h+=secOpen(pad(n++),'RECENT',u.sec.recent)+prose(REP.recent)+'</section><hr class="hairline" />';
      h+=secOpen(pad(n++),'OUTLOOK',u.sec.outlook)+prose(REP.outlook)+'</section><hr class="hairline" />';
      h+=secOpen(pad(n++),'BULL CASE',u.sec.bull)+factors(REP.bull,'bull','▲')+'</section><hr class="hairline" />';
      h+=secOpen(pad(n++),'BEAR CASE',u.sec.bear)+factors(REP.bear,'bear','▼')+'</section><hr class="hairline" />';
      h+=secOpen(pad(n++),'RISK',u.sec.risk)+risksH(REP.risks)+'</section><hr class="hairline" />';
      h+=secOpen(pad(n++),'VERDICT',u.sec.verdict);
      // 투자의견(stance)은 표시하지 않음 — 당사는 투자자문업 등록 사업자가 아님(법적 제약). 정성 요약(body)만 노출.
      h+='<div class="wrapup glass"><p>'+esc(REP.verdict?pk(REP.verdict.body):'')+'</p></div></section>';
      // 참고 출처: 기본(KRX·DART)을 항상 먼저, 그 뒤 웹 인용
      var baseCards=[
        srcCardL(u.srcKRX, u.srcKRXsub, 'https://data.krx.co.kr', '📊'),
        srcCardL(u.srcDART, u.srcDARTsub, 'https://dart.fss.or.kr', '📄')
      ];
      var webCards=(REP.sources||[]).map(srcCard);
      h+='<hr class="hairline" />'+secOpen(pad(n++),'SOURCES',u.sec.sources);
      h+='<div class="srcgrid">'+baseCards.concat(webCards).join('')+'</div></section>';
      h+='<div class="col"><div class="rep-meta rep-meta-end"><span><b>'+esc(u.reportDate)+'</b>'+esc(REP.reportDate||'')+'</span></div></div>';
      rb.innerHTML=h;
    }

    document.getElementById('disclaimer').innerHTML='<b>'+esc(u.discT)+'</b> '+esc(u.disc);
    (function setSEO(){
      try{
        var base='https://kosai.kr/stock.html?ticker='+encodeURIComponent(TK);
        var nm=tname(STOCK.name);
        var ttl=(Ln==='en') ? nm+' ('+TK+') AI Stock Report | KOSAI'
                            : nm+' ('+TK+') AI 분석 리포트 | KOSAI';
        var dsc;
        if(REP&&REP.verdict&&REP.verdict.body){
          dsc=String(pk(REP.verdict.body)).replace(/<[^>]*>/g,'').replace(/\s+/g,' ').trim().slice(0,155);
        }else{
          dsc=(Ln==='en') ? nm+' ('+TK+') key metrics, financials and valuation (PER·PBR·ROE·dividend) with AI analysis.'
                          : nm+' ('+TK+') 핵심 지표·재무·밸류에이션(PER·PBR·ROE·배당)과 AI 분석 리포트.';
        }
        function setMeta(sel,attr,val){ var el=document.querySelector(sel); if(el)el.setAttribute(attr,val); }
        document.title=ttl;
        setMeta('link[rel=canonical]','href',base);
        setMeta('meta[name=description]','content',dsc);
        setMeta('meta[property="og:title"]','content',ttl);
        setMeta('meta[property="og:description"]','content',dsc);
        setMeta('meta[property="og:url"]','content',base);
        setMeta('meta[name="twitter:title"]','content',ttl);
        setMeta('meta[name="twitter:description"]','content',dsc);
        var ld={"@context":"https://schema.org","@type":"WebPage","name":ttl,"description":dsc,"url":base,
                "inLanguage":(Ln==='en'?'en':'ko'),
                "about":{"@type":"Corporation","name":nm,"tickerSymbol":TK},
                "isPartOf":{"@type":"WebSite","name":"KOSAI","url":"https://kosai.kr/"}};
        var s=document.getElementById('kos-jsonld');
        if(!s){ s=document.createElement('script'); s.type='application/ld+json'; s.id='kos-jsonld'; document.head.appendChild(s); }
        s.textContent=JSON.stringify(ld);
      }catch(e){}
    })();
    syncWatch();
  }

  render();
  var wb=document.getElementById('watchBtn');
  if(wb)wb.addEventListener('click',function(){
    if(!window.KOSWatch) return;
    if(window.KOSWatch.has(TK)) window.KOSWatch.remove(TK); else window.KOSWatch.add(TK);
    syncWatch();
  });
  if(window.KOSi18n){ KOSi18n.register({}, render); }
})();

/* mobile menu */
const menuBtn=document.getElementById('menuBtn'),mobileMenu=document.getElementById('mobileMenu');
menuBtn.addEventListener('click',()=>mobileMenu.classList.toggle('open'));
mobileMenu.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>mobileMenu.classList.remove('open')));

/* theme */
const root=document.documentElement,themeBtn=document.getElementById('themeBtn');
const sunSVG='<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';
const moonSVG='<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>';
function applyTheme(t){root.setAttribute('data-theme',t);document.getElementById('themeIcon').innerHTML=t==='dark'?sunSVG:moonSVG;try{localStorage.setItem('kos-theme',t)}catch(e){}}
let saved='dark';try{saved=localStorage.getItem('kos-theme')||'dark'}catch(e){}
applyTheme(saved);
themeBtn.addEventListener('click',()=>applyTheme(root.getAttribute('data-theme')==='dark'?'light':'dark'));

</script>
