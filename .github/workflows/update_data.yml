name: 📊 주식 데이터 자동 업데이트

on:
  schedule:
    # pykrx 종가는 장 마감(15:30) 직후가 아니라 '저녁'에 게시됨.
    # 같은 날 종가를 확실히 받기 위해 저녁에 2회 실행(누락 대비 백업).
    - cron: '0 10 * * 1-5'   # 19:00 KST
    - cron: '0 12 * * 1-5'   # 21:00 KST
  workflow_dispatch:
    # 수동으로도 실행 가능 (GitHub 웹에서 버튼 클릭)
    inputs:
      full_universe:
        description: '전 상장사 수집(universe). 평소엔 no.'
        type: choice
        options: ['no', 'yes']
        default: 'no'
      universe_limit:
        description: 'universe 수집 상한(0=무제한, 디버그용)'
        type: string
        default: '0'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 데이터 수집
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          DART_KEY_SET: ${{ secrets.DART_API_KEY != '' }}
          FULL_UNIVERSE: ${{ inputs.full_universe == 'yes' && '1' || '' }}
          UNIVERSE_LIMIT: ${{ inputs.universe_limit || '0' }}
        run: |
          mkdir -p data
          echo "DART_KEY_SET=$DART_KEY_SET (len=${#DART_API_KEY})" > data/run.log
          echo "=== 스크립트 시작 $(date -u) ===" >> data/run.log
          python scripts/collect_data.py 2>&1 | tee -a data/run.log

      - name: 변경사항 커밋 & 푸시
        if: always()
        run: |
          git config --global user.email "bot@kosairesearch.github.io"
          git config --global user.name "KOS ai Bot"
          git add -A data/
          git commit --allow-empty -m "📊 데이터 업데이트 $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
          # 원격이 앞서간 경우(동시 커밋) rebase 후 재시도
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && break
            echo "push 재시도 $i..."; sleep $((i*3))
          done
