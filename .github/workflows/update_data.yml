name: 📊 주식 데이터 자동 업데이트

on:
  schedule:
    # pykrx 종가는 장 마감(15:30) 직후가 아니라 '저녁'에 게시됨.
    # ⚠ GitHub 예약 실행은 혼잡 시간대에 수 시간(관측상 ~7.5h)씩 지연됨.
    #   실행 시각을 통제할 수 없으므로 하루에 걸쳐 분산 예약 —
    #   어느 크론이 얼마나 밀리든 저녁(19~24시 KST)에 최소 1회는 갱신되도록.
    #   일찍 도는 크론은 종가 미게시 시 무변경 종료(기존 가드)라 무해.
    - cron: '43 2 * * 1-5'   # 11:43 KST (지연 시 저녁 보강용)
    - cron: '13 4 * * 1-5'   # 13:13 KST
    - cron: '49 6 * * 1-5'   # 15:49 KST
    - cron: '13 10 * * 1-5'  # 19:13 KST (본래 목표 시각)
    - cron: '43 11 * * 1-5'  # 20:43 KST
    - cron: '13 12 * * 1-5'  # 21:13 KST
    - cron: '43 13 * * 1-5'  # 22:43 KST
    - cron: '13 15 * * 1-5'  # 00:13 KST(+1) 자정 백업
    - cron: '43 18 * * 1-5'  # 03:43 KST(+1) 새벽 백업(현재 실질 동작 시간대)
  workflow_dispatch:
    # 수동으로도 실행 가능 (GitHub 웹에서 버튼 클릭)
    inputs:
      full_universe:
        description: '전 상장사 수집(universe). 평소엔 no.'
        type: choice
        options: ['no', 'yes']
        default: 'no'
      universe_limit:
        description: 'universe 수집 상한(0=무제한, 디버그용)'
        type: string
        default: '0'

# 데이터 쓰기 워크플로 동시 실행 금지(커밋 레이스로 결과 유실 방지)
concurrency:
  group: kos-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 데이터 수집
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          DART_KEY_SET: ${{ secrets.DART_API_KEY != '' }}
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
          FULL_UNIVERSE: ${{ inputs.full_universe == 'yes' && '1' || '' }}
          UNIVERSE_LIMIT: ${{ inputs.universe_limit || '0' }}
        run: |
          mkdir -p data
          echo "DART_KEY_SET=$DART_KEY_SET (len=${#DART_API_KEY})" > data/run.log
          echo "=== 스크립트 시작 $(date -u) ===" >> data/run.log
          python scripts/collect_data.py 2>&1 | tee -a data/run.log

      - name: 테마 랜딩 페이지 생성
        if: always()
        run: python scripts/generate_category_pages.py || true

      - name: sitemap 갱신
        if: always()
        run: python scripts/generate_sitemap.py || true

      - name: 변경사항 커밋 & 푸시
        if: always()
        run: |
          git config --global user.email "bot@kosairesearch.github.io"
          git config --global user.name "KOS ai Bot"
          git add -A data/ sitemap.xml themes.html high-dividend-stocks.html low-per-stocks.html high-growth-stocks.html blue-chip-stocks.html high-roe-stocks.html low-pbr-stocks.html
          git commit --allow-empty -m "📊 데이터 업데이트 $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
          # 원격이 앞서간 경우(동시 커밋) rebase 후 재시도
          ok=""
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push origin main; then ok=1; break; fi
            git rebase --abort 2>/dev/null || true
            echo "push 재시도 $i..."; sleep $((i*3))
          done
          if [ -z "$ok" ]; then echo "::error::push 최종 실패 — 결과 유실 방지를 위해 실패 처리"; exit 1; fi
