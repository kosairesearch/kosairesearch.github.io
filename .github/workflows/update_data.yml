name: 📊 주식 데이터 자동 업데이트

on:
  schedule:
    # 매일 평일 오후 3시 45분 KST (= UTC 06:45) 자동 실행
    - cron: '45 6 * * 1-5'
  workflow_dispatch:
    # 수동으로도 실행 가능 (GitHub 웹에서 버튼 클릭)

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 데이터 수집
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          DART_KEY_SET: ${{ secrets.DART_API_KEY != '' }}
        run: |
          mkdir -p data
          echo "DART_KEY_SET=$DART_KEY_SET (len=${#DART_API_KEY})" > data/run.log
          echo "=== 스크립트 시작 $(date -u) ===" >> data/run.log
          python scripts/collect_data.py 2>&1 | tee -a data/run.log

      - name: 변경사항 커밋 & 푸시
        if: always()
        run: |
          git config --global user.email "bot@kosairesearch.github.io"
          git config --global user.name "KOS ai Bot"
          git add -A data/
          git commit --allow-empty -m "📊 데이터 업데이트 $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
          # 원격이 앞서간 경우(동시 커밋) rebase 후 재시도
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && break
            echo "push 재시도 $i..."; sleep $((i*3))
          done
