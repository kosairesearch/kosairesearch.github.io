name: KRX 밸류에이션 커버리지 검증 (일회성)

on:
  workflow_dispatch:

concurrency:
  group: kos-data
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 프로브 실행 (결과를 파일로)
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          python scripts/probe_krx_fundamental.py 2>&1 | tee data/probe_result.txt || true

      - name: 결과 커밋
        run: |
          git config --global user.email "bot@kosairesearch.github.io"
          git config --global user.name "KOS ai Bot"
          git add data/probe_result.txt
          git commit -m "🔍 KRX 밸류에이션 프로브 결과" || exit 0
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && exit 0
            git rebase --abort 2>/dev/null || true
            sleep $((i*3))
          done
          exit 1
