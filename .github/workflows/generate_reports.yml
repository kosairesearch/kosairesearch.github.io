name: 🤖 AI 리서치 리포트 생성

on:
  # 비용 발생 — 원할 때만 수동 실행. 분할 백필용 (top_n 상위에서 limit개씩).
  workflow_dispatch:
    inputs:
      top_n:
        description: '대상: 시총 상위 N개 (이 중 아직 없는/오래된 것만 생성)'
        type: string
        default: '100'
      limit:
        description: '이번 실행 최대 생성 개수 (분할 백필, 0=제한없음)'
        type: string
        default: '20'

jobs:
  reports:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 최신 시세 갱신 (리포트가 최신 종가를 쓰도록)
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          mkdir -p data
          python scripts/collect_data.py 2>&1 | tee data/run.log || echo "(시세 갱신 실패 — 기존 데이터로 진행)"

      - name: 리포트 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          REPORT_MODEL: ${{ vars.REPORT_MODEL || 'claude-sonnet-4-6' }}
          REPORT_TOP_N: ${{ inputs.top_n || '100' }}
          REPORT_LIMIT: ${{ inputs.limit || '20' }}
        run: |
          set -o pipefail
          mkdir -p data
          echo "=== 리포트 생성 시작 $(date -u) ===" > data/reports_run.log
          python scripts/generate_reports.py 2>&1 | tee -a data/reports_run.log

      - name: 변경사항 커밋 & 푸시
        if: always()
        run: |
          git config --global user.email "bot@kosairesearch.github.io"
          git config --global user.name "KOS ai Bot"
          git add -A data/
          git commit --allow-empty -m "🤖 AI 리포트 업데이트 $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && break
            echo "push 재시도 $i..."; sleep $((i*3))
          done
