name: 🗓️ 공시 트리거 리포트 (정기보고서 제출 종목 자동 갱신)

on:
  schedule:
    - cron: '0 11 * * 1-5'   # 평일 20:00 KST — 당일 제출 공시 반영
    - cron: '0 1 * * 2-6'    # 평일 10:00 KST — 전일 공시 + 백로그 추가 소진
  workflow_dispatch:

# 데이터 쓰기 워크플로 동시 실행 금지(커밋 레이스로 결과 유실 방지)
concurrency:
  group: kos-data
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt

      - name: 최신 시세 갱신
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: |
          mkdir -p data
          python scripts/collect_data.py 2>&1 | tee data/run.log || echo "(시세 갱신 실패 — 기존 데이터 사용)"

      - name: 신규 정기보고서 감지 (전 종목)
        id: filings
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          FILINGS_MAX_PER_RUN: ${{ vars.FILINGS_MAX_PER_RUN || '120' }}
          FILINGS_LOOKBACK_DAYS: ${{ vars.FILINGS_LOOKBACK_DAYS || '30' }}
        run: python scripts/check_filings.py

      - name: 신규 제출 종목 밸류에이션 즉시 갱신
        if: steps.filings.outputs.count != '0' && steps.filings.outputs.count != ''
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
          VAL_TICKERS: ${{ steps.filings.outputs.new_tickers }}
        run: python scripts/collect_valuation.py 2>&1 | tee data/valuation_run.log || true

      - name: 신규 제출 종목 리포트 생성 (v2 · batch · 상위500 Opus/나머지 Sonnet)
        if: steps.filings.outputs.count != '0' && steps.filings.outputs.count != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
          REPORT_MODEL_TOP: 'claude-opus-4-8'
          REPORT_MODEL_REST: 'claude-sonnet-4-6'
          REPORT_MODEL_TOP_N: '500'
          REPORT_TICKERS: ${{ steps.filings.outputs.new_tickers }}
          BATCH_MAX_WAIT_SEC: ${{ vars.BATCH_MAX_WAIT_SEC || '18000' }}
        run: |
          set -o pipefail
          echo "=== 공시 트리거 v2 생성 $(date -u) · 대상 ${{ steps.filings.outputs.new_tickers }} ===" > data/reports_v2_run.log
          python scripts/generate_reports_v2.py auto 2>&1 | tee -a data/reports_v2_run.log

      - name: 커밋 & 푸시
        if: always()
        run: |
          git config --global user.email "bot@kosairesearch.github.io"
          git config --global user.name "KOS ai Bot"
          git add -A data/
          git commit --allow-empty -m "🗓️ 공시 트리거 리포트 $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && break
            echo "push 재시도 $i..."; sleep $((i*3))
          done
