name: 📅 오늘의 X 종목글(텔레그램)

# 하루 1종목 — 정해진 시간에 X 게시용 글을 텔레그램으로 푸시.
# GitHub 크론은 자주 밀리므로 백업 크론을 여러 개 두고, 스크립트의 '오늘 날짜
# 가드'로 하루 1번만 전송되게 한다(먼저 도는 크론이 보내면 나머지는 스킵).
on:
  schedule:
    # ⚠ GitHub 예약 실행은 혼잡 시간대에 밀릴 수 있어 '정시 보장'이 안 됨.
    #   18시 정각 보장은 외부 크론(cron-job.org)→workflow_dispatch 로 해야 함(README/설정 참고).
    #   아래는 무료 백업 — 18:00~19:00 사이 촘촘히 예약해 지연이 작을 때 최대한 근접 발송.
    #   '오늘 날짜 가드'로 하루 1회만 실제 전송(먼저 도는 크론이 보내면 나머지는 스킵).
    - cron: '0 9 * * 1-5'    # 18:00 KST (1차 — 장 마감 후)
    - cron: '15 9 * * 1-5'   # 18:15 KST (지연 백업)
    - cron: '30 9 * * 1-5'   # 18:30 KST (지연 백업)
    - cron: '45 9 * * 1-5'   # 18:45 KST (지연 백업)
    - cron: '0 10 * * 1-5'   # 19:00 KST (지연 백업)
  workflow_dispatch:
    inputs:
      ticker:
        description: '특정 종목 강제(6자리 코드). 비우면 자동 로테이션.'
        type: string
        default: ''
      force:
        description: '오늘 이미 보냈어도 재전송(테스트용)'
        type: boolean
        default: false

concurrency:
  group: kos-x-daily
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      # 정시 발송(외부 크론=workflow_dispatch) 경로에서는 '그날 종가'를 직접 수집한 뒤 글을 쓴다.
      # 데이터 파이프라인(update_data)이 아직 안 돌았어도 최신 시세로 급등주를 고르기 위함.
      # 실패해도(장 전·데이터 미게시) 기존 stocks.js로 발송하도록 continue-on-error. 커밋은 안 함.
      - name: 그날 시세 즉시 수집 (수동/외부크론 실행 시)
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: python scripts/collect_data.py
      # 전송 상태(_x_daily.json) 보존 — 날짜 가드/로테이션. 커밋·Pages 재배포 없음.
      - name: 상태 복원/저장 (캐시)
        uses: actions/cache@v4
        with:
          path: data/_x_daily.json
          key: x-daily-${{ github.run_id }}
          restore-keys: x-daily-
      - name: 종목글 생성 → 텔레그램
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_MODEL: claude-sonnet-4-6
          X_TICKER: ${{ inputs.ticker }}
          # 수동 실행(Run workflow)은 항상 발송 — 날짜 가드는 자동 크론 중복 방지용으로만 적용.
          X_FORCE: ${{ (github.event_name == 'workflow_dispatch' || inputs.force) && '1' || '' }}
        run: python scripts/daily_x_post.py
