name: 리포트 백필 워치독 (자동 재가동)

# self-chain이 어떤 이유로든 끊겨도(런 실패·취소·디스패치 유실) 주기적으로 점검해
# 상위 1000개 중 남은 리포트가 있고 진행 중인 run이 없으면 백필을 다시 시작한다.
# → 컨테이너/세션 수명과 무관하게 "완성될 때까지 절대 멈추지 않음"을 보장.

on:
  schedule:
    - cron: '*/30 * * * *'   # 30분마다 점검 (한 번 켜지면 self-chain이 이어가므로 시작 지연만 줄임)
  workflow_dispatch:

concurrency:
  group: reports-watchdog
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 병렬 리포트 run은 종목 JSON만 커밋하므로, 목록 페이지용 reports-index.js는
      # 여기서 단일 직렬로 전체 v2에서 재생성한다(충돌 없음, 표준 라이브러리만 사용).
      - name: 리포트 인덱스 재생성(직렬)
        run: |
          git config --global user.email "bot@kosairesearch.github.io"
          git config --global user.name "KOS ai Bot"
          python scripts/_reindex.py || true
          git add data/reports-index.js
          if git diff --cached --quiet; then
            echo "인덱스 변경 없음"
          else
            git commit -m "🔄 리포트 인덱스 동기화 $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
            for i in $(seq 1 25); do
              git fetch origin main -q 2>/dev/null || true
              if git rebase origin/main 2>/dev/null && git push origin main 2>/dev/null; then break; fi
              git rebase --abort 2>/dev/null || true
              sleep $(( (RANDOM % 9) + 2 ))
            done
          fi

      - name: 남은 리포트 점검 후 필요 시 재가동
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHARDS=5          # 병렬 샤드 수
          FILL_TO=3000      # 전 종목(~2,687)까지 — 넉넉히
          remaining=$(python scripts/_fill_remaining.py "$FILL_TO")
          echo "전 종목 중 남은 v2 리포트: $remaining"
          if [ "$remaining" -le 0 ]; then
            echo "→ 완료 상태. 재가동 불필요."
            exit 0
          fi
          # 진행 중인 run 수가 샤드 수 이상이면 충분 → 대기.
          # 샤드 일부가 죽어 부족해지면(전부 0이 아니어도) 풀세트 재가동해 병렬도를 회복한다.
          # 파일이 겹치지 않게 커밋되므로 약간의 중복은 충돌 없이 무해(소량 배치 낭비뿐).
          active=$(gh run list --workflow=generate_reports_v2.yml \
                     --status in_progress --json databaseId --jq 'length')
          queued=$(gh run list --workflow=generate_reports_v2.yml \
                     --status queued --json databaseId --jq 'length')
          running=$(( ${active:-0} + ${queued:-0} ))
          echo "진행 중 $active · 대기 $queued (합계 $running / 목표 $SHARDS)"
          if [ "$running" -ge "$SHARDS" ]; then
            echo "→ 충분히 진행 중. 워치독 대기."
            exit 0
          fi
          echo "→ 진행 $running < $SHARDS + 남은 $remaining개 → 샤드 ${SHARDS}개 병렬 백필 재가동"
          i=0
          while [ "$i" -lt "$SHARDS" ]; do
            gh workflow run generate_reports_v2.yml \
              -f mode=auto -f top_n=100 -f fill_to="$FILL_TO" \
              -f fill_from=0 -f fill_shards="$SHARDS" -f fill_shard="$i"
            i=$((i+1))
            sleep 2
          done
