name: 🚨 뉴스 이슈 알림(텔레그램)

# GitHub의 잦은 크론(*/10)은 부하 때 자주 건너뛰므로, 타이머를 GitHub에 맡기지 않고
# "한 번 시작된 작업이 약 5.5시간 동안 내부에서 10분마다 점검"하도록 함.
# 신뢰도 높은 5시간 간격 크론으로 새 작업을 띄워 끊김 없이 이어지게 한다.
#
# ⏸ 자동 텔레그램 이슈 알림 일시중지: 아래 schedule(자동 크론)을 비활성화했다.
#   → 텔레그램으로 뉴스/이슈 알림이 더 이상 자동 발송되지 않는다.
#   다시 켜려면 아래 schedule 블록의 주석(#)을 풀면 된다. 수동 실행(workflow_dispatch)은 유지.
on:
  # schedule:
  #   - cron: '11 0,5,10,15,20 * * *'   # 5시간마다 — 각 실행이 5.5h 동안 10분 간격 점검(겹쳐서 연속 커버)
  workflow_dispatch:
    inputs:
      test:
        description: '연결 테스트 (텔레그램 확인 메시지 1건)'
        type: boolean
        default: false

# 새 실행이 시작되면 '옛 코드로 돌던' 기존 실행을 취소·교체 — 수정 즉시 반영.
concurrency:
  group: kos-news-alert
  cancel-in-progress: true

jobs:
  alert:
    runs-on: ubuntu-latest
    timeout-minutes: 345
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      # 중복방지 상태(_news_seen.json) 보존 — 레포 커밋/Pages 재배포 없음
      - name: 상태 복원/저장 (캐시)
        uses: actions/cache@v4
        with:
          path: data/_news_seen.json
          key: news-seen-${{ github.run_id }}
          restore-keys: news-seen-
      - name: 10분 간격 점검 루프 (약 4.5시간)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_MODEL: claude-sonnet-4-6
          NEWS_TEST: ${{ inputs.test }}
        run: |
          if [ "${NEWS_TEST}" = "true" ]; then python scripts/news_alert.py; exit 0; fi
          # ⚠ 루프는 크론 간격(5h)보다 '짧게' 끝나야 함 — 그래야 작업이 정상 종료되며
          #   상태 캐시(_news_seen.json) post 저장이 실행됨. 길면 다음 크론이 취소→상태 유실→중복.
          end=$(( SECONDS + 16200 ))   # 4시간 30분(크론 5h보다 짧게 → 정상 종료·상태 저장 보장)
          while [ "$SECONDS" -lt "$end" ]; do
            python scripts/news_alert.py || true
            sleep 600
          done
