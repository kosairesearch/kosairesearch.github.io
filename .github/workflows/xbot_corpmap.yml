name: 🤖 x-bot corpmap 생성

# 종목코드→DART corp_code 매핑(x-bot/data/corpmap.json) 생성·커밋.
# x-bot이 웹서치 없이도 '최근 상황'을 DART 공시로 채우기 위한 데이터.
# 신규 상장 반영이 필요할 때 가끔 수동 실행하면 된다.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 1 * *'   # 매월 1일 12:00 KST — 신규상장 반영(비용 0, DART 무료)

concurrency:
  group: xbot-corpmap
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: corpmap 생성
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python x-bot/scripts/build_corpmap.py
      - name: 커밋 (변경 있을 때만, rebase 재시도)
        run: |
          git config user.name "KOS ai Bot"
          git config user.email "bot@kosairesearch.github.io"
          git add x-bot/data/corpmap.json
          git diff --cached --quiet && { echo "변경 없음"; exit 0; }
          git commit -m "🤖 x-bot corpmap 갱신"
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase && continue
          done
          exit 1
