name: (debug) DART 계정 덤프

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: '종목코드'
        default: '241560'
      year:
        description: '연도'
        default: '2024'
      reprt:
        description: '보고서코드'
        default: '11011'

concurrency:
  group: kos-debug
  cancel-in-progress: false

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: 덤프
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python scripts/_debug_dart.py "${{ inputs.ticker }}" "${{ inputs.year }}" "${{ inputs.reprt }}" 2>&1 | tee data/_debug_dart.log || true
      - name: 커밋
        run: |
          git config --global user.email "bot@kosairesearch.github.io"
          git config --global user.name "KOS ai Bot"
          git add -A data/_debug_dart.txt data/_debug_dart.log
          git commit -m "🐞 DART 계정 덤프" || exit 0
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push origin main; then break; fi
            git rebase --abort 2>/dev/null || true; sleep $((i*3))
          done
