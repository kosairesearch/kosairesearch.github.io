name: (debug) DART 덤프
on:
  workflow_dispatch:
    inputs:
      ticker: {description: '종목코드', default: '432320'}
      year: {description: '연도', default: '2025'}
      reprt: {description: '보고서코드', default: '11011'}
concurrency: {group: kos-debug, cancel-in-progress: false}
jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {contents: write}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install -r requirements.txt
      - env: {DART_API_KEY: "${{ secrets.DART_API_KEY }}"}
        run: python scripts/_debug_dart.py "${{ inputs.ticker }}" "${{ inputs.year }}" "${{ inputs.reprt }}" 2>&1 | tee data/_debug_dart.log || true
      - run: |
          git config --global user.email "bot@kosairesearch.github.io"; git config --global user.name "KOS ai Bot"
          git add -A data/_debug_dart.txt data/_debug_dart.log
          git commit -m "🐞 DART 덤프" || exit 0
          for i in 1 2 3 4 5; do git fetch origin main && git rebase -X theirs origin/main && git push origin main && break; git rebase --abort 2>/dev/null||true; sleep $((i*3)); done
